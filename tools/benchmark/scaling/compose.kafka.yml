# Kafka stack for the scalability matrix. Bring up with:
#   BAG_PATH=/path/to/bag NUM_ROBOTS=10 docker compose \
#     -f compose.kafka.yml up -d --scale robot=10
services:

  broker:
    image: confluentinc/cp-kafka:latest
    hostname: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker:29093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_LISTENERS: "INTERNAL://broker:29092,CONTROLLER://broker:29093,EXTERNAL://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://broker:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/broker/29092"]
      interval: 5s
      timeout: 5s
      retries: 10

  sink:
    image: ros2-kafka-dispatcher:scaling
    network_mode: host
    environment:
      NUM_ROBOTS: "${NUM_ROBOTS:?NUM_ROBOTS is required}"
      SINK_KIND: "kafka"
      BROKER_HOST: "localhost"
      ROS_DOMAIN_ID: "42"
    volumes:
      - ./sink_entrypoint.sh:/usr/local/bin/sink_entrypoint.sh:ro
      - ./results:/artifacts
    entrypoint: ["/usr/local/bin/sink_entrypoint.sh"]
    depends_on:
      - broker

  consumer:
    image: ros2-scaling-consumer:local
    network_mode: host
    command:
      - "--broker=kafka"
      - "--bootstrap=localhost:9092"
      - "--warmup=10"
      - "--duration=60"
      - "--output=/artifacts/consumer.jsonl"
    volumes:
      - ./results:/artifacts
    depends_on:
      - broker
      - sink

  robot:
    image: ros2-scaling-robot:local
    network_mode: host
    environment:
      BAG_PATH: "/data/bag"
      RATE_HZ: "10"
      ROS_DOMAIN_ID: "42"
    volumes:
      - "${BAG_PATH:?BAG_PATH is required}:/data/bag:ro"
    depends_on:
      - sink
