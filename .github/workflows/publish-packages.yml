name: Publish Packages

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  publish-docker-images:
    runs-on: ubuntu-latest
    env:
      ROS_DISTRO: humble
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          DOCKERHUB_IMAGE="${DOCKERHUB_REPOSITORY}"
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DOCKERHUB_TAGS=""

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${IMAGE_NAME}:${VERSION},${IMAGE_NAME}:sha-${SHORT_SHA}"
            if [[ -n "${DOCKERHUB_IMAGE}" ]]; then
              DOCKERHUB_TAGS="${DOCKERHUB_IMAGE}:${VERSION},${DOCKERHUB_IMAGE}:sha-${SHORT_SHA}"
            fi
          else
            TAGS="${IMAGE_NAME}:latest,${IMAGE_NAME}:sha-${SHORT_SHA}"
            if [[ -n "${DOCKERHUB_IMAGE}" ]]; then
              DOCKERHUB_TAGS="${DOCKERHUB_IMAGE}:latest,${DOCKERHUB_IMAGE}:sha-${SHORT_SHA}"
            fi
          fi

          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_tags=${DOCKERHUB_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_REPOSITORY != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ROS_DISTRO=${{ env.ROS_DISTRO }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.meta.outputs.dockerhub_tags }}
