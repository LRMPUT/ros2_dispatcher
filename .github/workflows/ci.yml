name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      ROS_DISTRO: humble
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          DOCKERHUB_IMAGE="${DOCKERHUB_REPOSITORY}"
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DOCKERHUB_TAGS=""
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${IMAGE_NAME}:${VERSION},${IMAGE_NAME}:sha-${SHORT_SHA}"
            if [[ -n "${DOCKERHUB_IMAGE}" ]]; then
              DOCKERHUB_TAGS="${DOCKERHUB_IMAGE}:${VERSION},${DOCKERHUB_IMAGE}:sha-${SHORT_SHA}"
            fi
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            TAGS="${IMAGE_NAME}:latest,${IMAGE_NAME}:sha-${SHORT_SHA}"
            if [[ -n "${DOCKERHUB_IMAGE}" ]]; then
              DOCKERHUB_TAGS="${DOCKERHUB_IMAGE}:latest,${DOCKERHUB_IMAGE}:sha-${SHORT_SHA}"
            fi
          else
            TAGS="${IMAGE_NAME}:sha-${SHORT_SHA}"
            if [[ -n "${DOCKERHUB_IMAGE}" ]]; then
              DOCKERHUB_TAGS="${DOCKERHUB_IMAGE}:sha-${SHORT_SHA}"
            fi
          fi
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_tags=${DOCKERHUB_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build builder image (test)
        run: |
          docker buildx build \
            --load \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --target builder \
            --file docker/Dockerfile \
            --build-arg ROS_DISTRO=${ROS_DISTRO} \
            --build-arg GIT_SHA=${GITHUB_SHA} \
            --build-arg BUILD_DATE="${{ steps.meta.outputs.build_date }}" \
            --build-arg IMAGE_SOURCE="https://github.com/${GITHUB_REPOSITORY}" \
            -t ${{ steps.meta.outputs.image_name }}:builder \
            .

      - name: Smoke test (builder workspace)
        run: |
          docker run --rm ${{ steps.meta.outputs.image_name }}:builder \
            bash -lc "source /opt/ros/${ROS_DISTRO}/setup.bash && source /ws/install/setup.bash && ros2 pkg list >/dev/null"

      - name: Build runtime image (test)
        run: |
          docker buildx build \
            --load \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --file docker/Dockerfile \
            --build-arg ROS_DISTRO=${ROS_DISTRO} \
            --build-arg GIT_SHA=${GITHUB_SHA} \
            --build-arg BUILD_DATE="${{ steps.meta.outputs.build_date }}" \
            --build-arg IMAGE_SOURCE="https://github.com/${GITHUB_REPOSITORY}" \
            -t ${{ steps.meta.outputs.image_name }}:ci \
            .

      - name: Smoke test (runtime dependencies)
        run: |
          docker run --rm ${{ steps.meta.outputs.image_name }}:ci \
            bash -lc "set -eo pipefail; \
                      source /opt/ros/${ROS_DISTRO}/setup.bash; \
                      source /ws/install/setup.bash; \
                      ros2 pkg executables kafka_sink >/dev/null; \
                      ros2 pkg executables mosquitto_sink >/dev/null; \
                      ! ldd /ws/install/lib/libkafka_sink.so | grep -q 'not found'; \
                      ! ldd /ws/install/lib/libmosquitto_sink.so | grep -q 'not found'; \
                      echo OK"

      - name: Lint (ruff)
        run: |
          if [ -f pyproject.toml ] && grep -q "\[tool.ruff\]" pyproject.toml; then
            python -m pip install ruff==0.6.4
            ruff check .
          else
            echo "Ruff not configured; skipping."
          fi

      - name: Lint (black)
        run: |
          if [ -f pyproject.toml ] && grep -q "\[tool.black\]" pyproject.toml; then
            python -m pip install black==24.4.2
            black --check .
          else
            echo "Black not configured; skipping."
          fi

      - name: Lint (clang-format)
        run: |
          if [ -f .clang-format ]; then
            sudo apt-get update
            sudo apt-get install -y clang-format
            clang-format --version
            FILES=$(git ls-files '*.hpp' '*.h' '*.cpp' '*.cc' '*.c')
            if [ -n "$FILES" ]; then
              clang-format --dry-run --Werror $FILES
            else
              echo "No C/C++ files to format."
            fi
          else
            echo "clang-format not configured; skipping."
          fi
