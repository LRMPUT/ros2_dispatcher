name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      ROS_DISTRO: humble
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          DOCKERHUB_IMAGE="${DOCKERHUB_REPOSITORY}"
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DOCKERHUB_TAGS=""
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${IMAGE_NAME}:${VERSION},${IMAGE_NAME}:sha-${SHORT_SHA}"
            if [[ -n "${DOCKERHUB_IMAGE}" ]]; then
              DOCKERHUB_TAGS="${DOCKERHUB_IMAGE}:${VERSION},${DOCKERHUB_IMAGE}:sha-${SHORT_SHA}"
            fi
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            TAGS="${IMAGE_NAME}:latest,${IMAGE_NAME}:sha-${SHORT_SHA}"
            if [[ -n "${DOCKERHUB_IMAGE}" ]]; then
              DOCKERHUB_TAGS="${DOCKERHUB_IMAGE}:latest,${DOCKERHUB_IMAGE}:sha-${SHORT_SHA}"
            fi
          else
            TAGS="${IMAGE_NAME}:sha-${SHORT_SHA}"
            if [[ -n "${DOCKERHUB_IMAGE}" ]]; then
              DOCKERHUB_TAGS="${DOCKERHUB_IMAGE}:sha-${SHORT_SHA}"
            fi
          fi
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_tags=${DOCKERHUB_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build builder image (test)
        run: |
          docker buildx build \
            --load \
            --target builder \
            --file docker/Dockerfile \
            --build-arg ROS_DISTRO=${ROS_DISTRO} \
            --build-arg GIT_SHA=${GITHUB_SHA} \
            --build-arg BUILD_DATE="${{ steps.meta.outputs.build_date }}" \
            --build-arg IMAGE_SOURCE="https://github.com/${GITHUB_REPOSITORY}" \
            -t ${{ steps.meta.outputs.image_name }}:builder \
            .

      - name: Smoke test (ROS 2 environment)
        run: |
          docker run --rm ${{ steps.meta.outputs.image_name }}:builder \
            bash -lc "source /opt/ros/${ROS_DISTRO}/setup.bash && source /ws/install/setup.bash && ros2 pkg list >/dev/null"

      - name: Build runtime image (test)
        run: |
          docker buildx build \
            --load \
            --file docker/Dockerfile \
            --build-arg ROS_DISTRO=${ROS_DISTRO} \
            --build-arg GIT_SHA=${GITHUB_SHA} \
            --build-arg BUILD_DATE="${{ steps.meta.outputs.build_date }}" \
            --build-arg IMAGE_SOURCE="https://github.com/${GITHUB_REPOSITORY}" \
            -t ${{ steps.meta.outputs.image_name }}:ci \
            .

      - name: Lint (ruff)
        run: |
          if [ -f pyproject.toml ] && grep -q "\[tool.ruff\]" pyproject.toml; then
            python -m pip install ruff==0.6.4
            ruff check .
          else
            echo "Ruff not configured; skipping."
          fi

      - name: Lint (black)
        run: |
          if [ -f pyproject.toml ] && grep -q "\[tool.black\]" pyproject.toml; then
            python -m pip install black==24.4.2
            black --check .
          else
            echo "Black not configured; skipping."
          fi

      - name: Lint (clang-format)
        run: |
          if [ -f .clang-format ]; then
            sudo apt-get update
            sudo apt-get install -y clang-format
            clang-format --version
            FILES=$(git ls-files '*.hpp' '*.h' '*.cpp' '*.cc' '*.c')
            if [ -n "$FILES" ]; then
              clang-format --dry-run --Werror $FILES
            else
              echo "No C/C++ files to format."
            fi
          else
            echo "clang-format not configured; skipping."
          fi

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && env.DOCKERHUB_REPOSITORY != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            ROS_DISTRO=${{ env.ROS_DISTRO }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.meta.outputs.dockerhub_tags }}
